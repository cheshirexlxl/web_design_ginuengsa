<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한투어</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="script/jquery-1.12.3.js"></script>
    <script src="script/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <a href="#"><img src="images/logo.png" alt="대한투어 로고"></a>
            </div>
            <nav class="main">
                <ul class="main-menu">
                    <li><a href="#">해외여행</a></li>
                    <li><a href="#">국내여행</a></li>
                    <li><a href="#">제주도</a></li>
                    <li><a href="#">렌터카</a></li>
                </ul>
            </nav>
            <nav class="sub">
                <div class="inner">
                    <ul class="sub-menu">
                        <li><a href="#">동남아/대만</a></li>
                        <li><a href="#">중국/홍콩</a></li>
                        <li><a href="#">유럽/두바이</a></li>
                        <li><a href="#">미주/하와이</a></li>
                    </ul>
                    <ul class="sub-menu">
                        <li><a href="#">서울/경기권</a></li>
                        <li><a href="#">충청권</a></li>
                        <li><a href="#">전라권</a></li>
                        <li><a href="#">경상/강원권</a></li>
                    </ul>
                    <ul class="sub-menu">
                        <li><a href="#">버스여행</a></li>
                        <li><a href="#">자유여행</a></li>
                        <li><a href="#">호텔/펜션</a></li>
                    </ul>
                    <ul class="sub-menu">
                        <li><a href="#">국내 렌터카</a></li>
                        <li><a href="#">국외 렌터카</a></li>
                    </ul>
                </div>
            </nav>
        </header>
        <section id="slides">
            <div class="slide-container">
                <div class="slide">
                    <a href="#"><img src="images/slide1.jpg" alt="슬라이드 이미지1"></a>
                </div>
                <div class="slide">
                    <a href="#"><img src="images/slide2.jpg" alt="슬라이드 이미지2"></a>
                </div>
                <div class="slide">
                    <a href="#"><img src="images/slide3.jpg" alt="슬라이드 이미지3"></a>
                </div>
            </div>
        </section>
        <section id="contents">
            <div class="notice-wrap">
                <div class="board-tit"><a href="#" id="">공지사항</a></div>
                <ul class="notice">
                    <li><a href="#" class="btn-modal">공지사항 제목</a></li>
                    <li><a href="#">공지사항 제목</a></li>
                    <li><a href="#">공지사항 제목</a></li>
                    <li><a href="#">공지사항 제목</a></li>
                </ul>
            </div>
            <div class="gallery-wrap">
                <div class="board-tit"><a href="#">갤러리</a></div>
                <ul class="gallery">
                    <li><a href="#"><img src="images/g1.jpg" alt="갤러리 이미지1"></a></li>
                    <li><a href="#"><img src="images/g2.jpg" alt="갤러리 이미지2"></a></li>
                    <li><a href="#"><img src="images/g3.jpg" alt="갤러리 이미지3"></a></li>
                </ul>
            </div>
            <div class="link-wrap">
                <a href="#"><img src="images/goto.jpg" alt="바로가기 이미지"></a>
            </div>
        </section>
        <footer>
            <div class="copy"><p>&copy; 2024 대한투어. All rights reserved.</p></div>
            <div class="inner">
                <ul class="sns">
                    <li><a href="#"><img src="images/sns1.jpg" alt=""></a></li>
                    <li><a href="#"><img src="images/sns2.jpg" alt=""></a></li>
                    <li><a href="#"><img src="images/sns3.jpg" alt=""></a></li>
                </ul>
                <div class="family">
                    <select name="family" id="family">
                        <option value="#">패밀리 사이트</option>
                        <option value="#">사이트1</option>
                        <option value="#">사이트2</option>
                        <option value="#">사이트3</option>
                    </select>
                </div>
            </div>
        </footer>
    </div>  
    <div id="modal">
        <div class="close bg"></div>
        <div class="inner">
            <div class="card">
                <h1>레이어 팝어버 제목</h1>
                <p>레이어 팝업 내용이 들어갑니다.</p>
                <div class="btn-wrap"><button class="close">닫기</button></div>
            </div>
        </div>
    </div>  
</body>
</html>
